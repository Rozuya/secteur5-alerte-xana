<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secteur 5 : Alerte X.A.N.A. - Accueil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lyoko-green: #00ff66;
            --lyoko-blue: #00ccff;
            --bg-dark: #05080a;
            --error-red: #ff3366;
            --text-main: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--lyoko-green);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
        }

        /* BARRE D'AUDIO EN HAUT */
        .audio-controls {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(8, 12, 20, 0.95);
            border: 1px solid var(--lyoko-blue);
            border-radius: 8px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 50;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.3);
        }

        .music-btn {
            background: var(--error-red);
            color: #ffffff;
            border: none;
            padding: 6px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .music-btn:hover {
            opacity: 0.9;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--lyoko-blue);
            font-size: 0.9rem;
        }

        input[type="range"] {
            accent-color: var(--lyoko-green);
            cursor: pointer;
            width: 90px;
        }

        /* TERMINAL PRINCIPAL */
        .terminal-container {
            background: rgba(8, 12, 20, 0.9);
            border: 2px solid var(--lyoko-green);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.3);
            padding: 30px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .game-subtitle {
            color: var(--lyoko-blue);
            font-size: 1rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--error-red);
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--error-red);
            letter-spacing: 2px;
        }

        .rules-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px dashed var(--lyoko-blue);
            padding: 20px;
            border-radius: 5px;
            text-align: left;
            margin-bottom: 25px;
            line-height: 1.6;
            color: var(--text-main);
            font-size: 1.1rem;
        }

        .rules-box p {
            margin-bottom: 10px;
        }

        .rules-box ul {
            list-style: none;
            padding-left: 10px;
        }

        .rules-box li {
            margin-bottom: 8px;
        }

        .start-btn {
            width: 100%;
            padding: 18px;
            background: var(--lyoko-green);
            color: #000;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px var(--lyoko-green);
        }

        .start-btn:hover {
            background: var(--lyoko-blue);
            box-shadow: 0 0 30px var(--lyoko-blue);
            transform: scale(1.02);
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .terminal-container { padding: 20px; }
            .rules-box { font-size: 0.95rem; }
            .start-btn { font-size: 1.1rem; padding: 15px; }
            .audio-controls { top: 10px; right: 10px; padding: 5px 10px; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="Alerte.XANA.mp3" type="audio/mpeg">
    </audio>

    <div class="audio-controls">
        <button id="toggle-music" class="music-btn">🔇 MUSIQUE : OFF</button>
        <div class="volume-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            <span id="volume-text">50%</span>
        </div>
    </div>

    <div class="terminal-container">
        <div class="game-subtitle">SECTEUR 5</div>
        <h1>👾 ALERTE X.A.N.A.</h1>

        <div class="rules-box">
            <p><strong>ATTENTION AGENT !</strong></p>
            <p>X.A.N.A. a envoyé des spectres pour attaquer le Supercalculateur !</p>
            <br>
            <p><strong>MISSION :</strong></p>
            <ul>
                <li>⚡ Clique sur <strong>10 spectres rouges 👁️</strong></li>
                <li>⏱️ Tu as <strong>30 secondes</strong> chrono !</li>
                <li>🎯 Reste concentré, ils se déplacent vite !</li>
            </ul>
        </div>

        <button class="start-btn" id="start-btn">
            ▶️ LANCER LA MISSION
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- GESTION MUSIQUE ET VOLUME ---
            const audio = document.getElementById('bg-music');
            const musicBtn = document.getElementById('toggle-music');
            const volumeSlider = document.getElementById('volume-slider');
            const volumeText = document.getElementById('volume-text');
            const startBtn = document.getElementById('start-btn');

            audio.volume = parseFloat(volumeSlider.value);

            function updateVolume() {
                const val = parseFloat(volumeSlider.value);
                audio.volume = val;
                const percent = Math.round(val * 100);
                volumeText.innerText = percent + "%";
            }

            volumeSlider.addEventListener('input', updateVolume);
            volumeSlider.addEventListener('change', updateVolume);

            function playAudio() {
                return audio.play().then(() => {
                    musicBtn.innerText = "🔊 MUSIQUE : ON";
                    musicBtn.style.background = "var(--lyoko-blue)";
                    musicBtn.style.color = "#000";
                }).catch((error) => {
                    console.error("Erreur de lecture audio :", error);
                    alert("Impossible de lire le fichier 'Alerte.XANA.mp3'. Vérifie qu'il est bien placé au même endroit sur GitHub !");
                });
            }

            function pauseAudio() {
                audio.pause();
                musicBtn.innerText = "🔇 MUSIQUE : OFF";
                musicBtn.style.background = "var(--error-red)";
                musicBtn.style.color = "#fff";
            }

            musicBtn.addEventListener('click', () => {
                if (audio.paused) {
                    playAudio();
                } else {
                    pauseAudio();
                }
            });

            // LANCEMENT DU JEU
            startBtn.addEventListener('click', () => {
                playAudio().finally(() => {
                    window.location.href = "jeu.html";
                });
            });

            // --- ANIMATION DE FOND (MATRIX) ---
            const canvas = document.getElementById('matrix-bg');
            const ctx = canvas.getContext('2d');

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const chars = "0123456789アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン";
            const charArray = chars.split('');
            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = [];

            for (let x = 0; x < columns; x++) {
                drops[x] = 1;
            }

            function drawMatrix() {
                ctx.fillStyle = "rgba(5, 8, 10, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00ff66";
                ctx.font = fontSize + "px monospace";

                for (let i = 0; i < drops.length; i++) {
                    const text = charArray[Math.floor(Math.random() * charArray.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
            setInterval(drawMatrix, 35);
        });
    </script>
</body>
</html>
