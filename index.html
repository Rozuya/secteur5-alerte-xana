<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secteur 5 : Alerte X.A.N.A. - Accueil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lyoko-green: #00ff66;
            --lyoko-blue: #00ccff;
            --bg-dark: #05080a;
            --error-red: #ff3366;
            --warning-yellow: #ffcc00;
            --text-main: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--lyoko-green);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
        }

        /* BARRE D'AUDIO EN HAUT */
        .audio-controls {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(8, 12, 20, 0.95);
            border: 1px solid var(--lyoko-blue);
            border-radius: 8px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 50;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.3);
        }

        .music-btn {
            background: var(--error-red);
            color: #ffffff;
            border: none;
            padding: 6px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .music-btn:hover {
            opacity: 0.9;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--lyoko-blue);
            font-size: 0.9rem;
        }

        input[type="range"] {
            accent-color: var(--lyoko-green);
            cursor: pointer;
            width: 90px;
        }

        /* TERMINAL PRINCIPAL */
        .terminal-container {
            background: rgba(8, 12, 20, 0.9);
            border: 2px solid var(--lyoko-green);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.3);
            padding: 30px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .game-subtitle {
            color: var(--lyoko-blue);
            font-size: 1rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--error-red);
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--error-red);
            letter-spacing: 2px;
        }

        .rules-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px dashed var(--lyoko-blue);
            padding: 20px;
            border-radius: 5px;
            text-align: left;
            margin-bottom: 25px;
            line-height: 1.6;
            color: var(--text-main);
            font-size: 1.05rem;
        }
