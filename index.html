<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secteur 5 - Accueil Mission</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lyoko-green: #00ff66;
            --lyoko-blue: #00ccff;
            --bg-dark: #05080a;
            --error-red: #ff3366;
            --warning-yellow: #ffcc00;
            --text-main: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background-color: var(--bg-dark);
            color: var(--lyoko-green);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* FOND MATRIX */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.25;
            pointer-events: none;
        }

        /* BARRE AUDIO */
        .audio-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(8, 12, 20, 0.95);
            border: 2px solid var(--lyoko-blue);
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 50;
        }

        .music-btn {
            background: var(--lyoko-blue);
            color: #000;
            border: none;
            padding: 8px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 5px;
            touch-action: manipulation;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--lyoko-blue);
            font-size: 0.85rem;
            font-weight: bold;
        }

        input[type="range"] {
            accent-color: var(--lyoko-green);
            cursor: pointer;
            width: 70px;
        }

        /* BOÎTE D'ACCUEIL ADAPTATIVE */
        .intro-modal {
            position: relative;
            z-index: 10;
            background: rgba(10, 17, 24, 0.95);
            border: 3px solid var(--lyoko-green);
            border-radius: 12px;
            padding: 24px 20px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 0 30px var(--lyoko-green);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--lyoko-blue);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .title {
            font-size: 1.8rem;
            color: var(--error-red);
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--error-red);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mission-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px dashed var(--lyoko-blue);
            border-radius: 8px;
            padding: 16px 12px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mission-title {
            color: #fff;
            font-size: 0.95rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mission-intro {
            color: var(--text-main);
            font-size: 0.9rem;
            line-height: 1.3;
        }

        .objective-highlight {
            background: rgba(0, 255, 102, 0.1);
            border-left: 3px solid var(--lyoko-green);
            padding: 8px 10px;
            color: #fff;
            font-weight: bold;
            font-size: 0.95rem;
            line-height: 1.4;
            white-space: normal;
        }

        .rules-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .rules-list li {
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.2;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .dot-red { background: #ff3366; box-shadow: 0 0 6px #ff3366; }
        .dot-blue { background: #00ccff; box-shadow: 0 0 6px #00ccff; }
        .dot-yellow { background: #ffcc00; box-shadow: 0 0 6px #ffcc00; }

        .btn-start {
            background: var(--lyoko-green);
            color: #000;
            border: none;
            padding: 14px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--lyoko-green);
            text-transform: uppercase;
            transition: transform 0.1s ease;
            touch-action: manipulation;
        }

        .btn-start:active {
            transform: scale(0.96);
        }

        @media (max-width: 480px) {
            .intro-modal { padding: 18px 14px; }
            .title { font-size: 1.5rem; }
            .objective-highlight { font-size: 0.88rem; }
            .rules-list { font-size: 0.85rem; }
            .volume-container span { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="audio-controls">
        <button id="toggle-music" class="music-btn">🔊 MUSIQUE : ON</button>
        <div class="volume-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            <span id="volume-text">50%</span>
        </div>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="Alerte.XANA.mp3" type="audio/mpeg">
    </audio>

    <div class="intro-modal">
        <div>
            <div class="subtitle">SECTEUR 5</div>
            <div class="title">👾 ALERTE X.A.N.A.</div>
        </div>

        <div class="mission-box">
            <div class="mission-title">ATTENTION AGENT !</div>
            <div class="mission-intro">X.A.N.A. lance une attaque sur le Supercalculateur !</div>
            
            <div class="objective-highlight">
                ⚡ Objectif : Marque au moins 25 Points en 35 secondes !
            </div>

            <ul class="rules-list">
                <li><span class="dot dot-red"></span> Spectre rouge : +1 Point</li>
                <li><span class="dot dot-blue"></span> Orbe cyan : +3 Points (Bonus !)</li>
                <li><span class="dot dot-yellow"></span> Piège jaune : -1 Point (Attention !)</li>
            </ul>
        </div>

        <button class="btn-start" id="start-btn">▶ LANCER LA MISSION</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-music');
            const musicBtn = document.getElementById('toggle-music');
            const volumeSlider = document.getElementById('volume-slider');
            const volumeText = document.getElementById('volume-text');
            const startBtn = document.getElementById('start-btn');

            // --- AUDIO ---
            audio.volume = parseFloat(volumeSlider.value);
            volumeSlider.addEventListener('input', () => {
                audio.volume = parseFloat(volumeSlider.value);
                if (volumeText) volumeText.innerText = Math.round(audio.volume * 100) + "%";
            });

            function playMusic() {
                audio.play().then(() => {
                    musicBtn.innerText = "🔊 MUSIQUE : ON";
                    musicBtn.style.background = "var(--lyoko-blue)";
                    musicBtn.style.color = "#000";
                }).catch(() => {
                    musicBtn.innerText = "🔇 MUSIQUE : OFF";
                    musicBtn.style.background = "var(--error-red)";
                    musicBtn.style.color = "#fff";
                });
            }

            musicBtn.addEventListener('click', () => {
                if (audio.paused) playMusic(); else {
                    audio.pause();
                    musicBtn.innerText = "🔇 MUSIQUE : OFF";
                    musicBtn.style.background = "var(--error-red)";
                    musicBtn.style.color = "#fff";
                }
            });

            document.body.addEventListener('touchstart', () => {
                if (audio.paused) playMusic();
            }, { once: true });

            startBtn.addEventListener('click', () => {
                window.location.href = 'jeu.html';
            });

            // --- FOND MATRIX ---
            const canvas = document.getElementById('matrix-bg');
            const ctx = canvas.getContext('2d');
            function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', res); res();
            let drops = Array(Math.floor(canvas.width / 16)).fill(1);

            setInterval(() => {
                ctx.fillStyle = "rgba(5, 8, 10, 0.12)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00ff66"; ctx.font = "16px monospace";
                drops.forEach((y, i) => {
                    ctx.fillText("01"[Math.floor(Math.random()*2)], i * 16, y * 16);
                    if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }, 45);
        });
    </script>
</body>
</html>
