<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secteur 5 - Mission Alerte X.A.N.A.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lyoko-green: #00ff66;
            --lyoko-blue: #00ccff;
            --bg-dark: #05080a;
            --error-red: #ff3366;
            --warning-yellow: #ffcc00;
            --text-main: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--lyoko-green);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        /* BARRE AUDIO */
        .audio-controls {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(8, 12, 20, 0.95);
            border: 1px solid var(--lyoko-blue);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 50;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.3);
        }

        .music-btn {
            background: var(--error-red);
            color: #ffffff;
            border: none;
            padding: 6px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 4px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--lyoko-blue);
            font-size: 0.85rem;
        }

        input[type="range"] {
            accent-color: var(--lyoko-green);
            cursor: pointer;
            width: 70px;
        }

        /* HEADER */
        .game-header {
            margin-top: 15px;
            background: rgba(8, 12, 20, 0.9);
            border: 2px solid var(--lyoko-blue);
            border-radius: 10px;
            padding: 10px 20px;
            display: flex;
            gap: 25px;
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.3);
        }

        .stat-box { text-align: center; }
        .stat-title { font-size: 0.75rem; color: #fff; text-transform: uppercase; }
        .stat-value { font-size: 1.6rem; font-weight: bold; color: var(--lyoko-green); }
        .stat-value.red { color: var(--error-red); }

        /* ZONE DE JEU */
        .game-area {
            position: relative;
            width: 100%;
            height: 75vh;
            z-index: 10;
        }

        /* SPECTRES & CIBLES DESIGN EN SVG */
        .target {
            position: absolute;
            width: 80px;
            height: 80px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            animation: spawnAnim 0.3s ease-out;
        }

        @keyframes spawnAnim {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* TYPE 1 : SPECTRE RED (X.A.N.A.) */
        .target.red-spectre {
            filter: drop-shadow(0 0 12px var(--error-red));
        }

        /* TYPE 2 : BUG BLUE (+3 PTS) */
        .target.blue-bonus {
            filter: drop-shadow(0 0 15px var(--lyoko-blue));
            animation: pulseBonus 0.6s infinite alternate;
        }

        @keyframes pulseBonus {
            from { transform: scale(0.95); }
            to { transform: scale(1.15); }
        }

        /* TYPE 3 : VIRUS TRAP (-1 PT) */
        .target.yellow-trap {
            filter: drop-shadow(0 0 12px var(--warning-yellow));
        }

        /* MODALE */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: #0a1118;
            border: 3px solid var(--lyoko-blue);
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 0 35px var(--lyoko-blue);
        }

        .modal h2 { font-size: 1.8rem; margin-bottom: 12px; text-transform: uppercase; }
        .modal p { color: #fff; font-size: 1.1rem; margin-bottom: 20px; line-height: 1.5; }

        .legend-box {
            background: rgba(255,255,255,0.05);
            border: 1px dashed var(--lyoko-blue);
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: left;
        }

        .legend-box div { margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        .btn {
            padding: 14px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-green { background: var(--lyoko-green); color: #000; box-shadow: 0 0 10px var(--lyoko-green); }
        .btn-blue { background: var(--lyoko-blue); color: #000; box-shadow: 0 0 10px var(--lyoko-blue); }

        .btn:hover { transform: scale(1.03); }

        @media (max-width: 480px) {
            .stat-value { font-size: 1.3rem; }
            .target { width: 75px; height: 75px; }
            .modal h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="Alerte.XANA.mp3" type="audio/mpeg">
    </audio>

    <div class="audio-controls">
        <button id="toggle-music" class="music-btn">🔇 MUSIQUE : OFF</button>
        <div class="volume-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            <span id="volume-text">50%</span>
        </div>
    </div>

    <div class="game-header">
        <div class="stat-box">
            <div class="stat-title">SCORE</div>
            <div class="stat-value" id="score">0 / 12</div>
        </div>
        <div class="stat-box">
            <div class="stat-title">CHRONO</div>
            <div class="stat-value red" id="timer">35s</div>
        </div>
    </div>

    <div class="game-area" id="game-area"></div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title" style="color: var(--lyoko-blue);">SECTEUR 5 : MISSION</h2>
            <p id="modal-text">Atteins **12 Points** avant la fin du temps pour désactiver la tour !</p>
            
            <div class="legend-box">
                <div>🔴 <strong>Spectre X.A.N.A. :</strong> +1 Point</div>
                <div>🔵 <strong>Orbe Cyan :</strong> +3 Points !</div>
                <div>🟠 <strong>Faux Bug :</strong> -1 Point !</div>
            </div>

            <div class="btn-group" id="modal-buttons">
                <button class="btn btn-green" onclick="startGame()">▶️ JOUER</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-music');
            const musicBtn = document.getElementById('toggle-music');
            const volumeSlider = document.getElementById('volume-slider');
            const volumeText = document.getElementById('volume-text');
            const gameArea = document.getElementById('game-area');
            const scoreEl = document.getElementById('score');
            const timerEl = document.getElementById('timer');
            const modalOverlay = document.getElementById('modal-overlay');
            const modalTitle = document.getElementById('modal-title');
            const modalText = document.getElementById('modal-text');
            const modalButtons = document.getElementById('modal-buttons');

            let score = 0;
            const targetScore = 12;
            let timeLeft = 35;
            let gameActive = false;
            let gameInterval, targetTimeout;

            // --- AUDIO ---
            audio.volume = parseFloat(volumeSlider.value);
            function updateVol() {
                audio.volume = parseFloat(volumeSlider.value);
                volumeText.innerText = Math.round(audio.volume * 100) + "%";
            }
            volumeSlider.addEventListener('input', updateVol);

            function playMusic() {
                audio.play().then(() => {
                    musicBtn.innerText = "🔊 MUSIQUE : ON";
                    musicBtn.style.background = "var(--lyoko-blue)";
                    musicBtn.style.color = "#000";
                }).catch(e => console.log("Audio bloqué"));
            }

            function stopMusic() {
                audio.pause();
                musicBtn.innerText = "🔇 MUSIQUE : OFF";
                musicBtn.style.background = "var(--error-red)";
                musicBtn.style.color = "#fff";
            }

            musicBtn.addEventListener('click', () => {
                if (audio.paused) playMusic(); else stopMusic();
            });

            // --- FOND MATRIX ---
            const canvas = document.getElementById('matrix-bg');
            const ctx = canvas.getContext('2d');
            function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', res); res();
            const cols = Math.floor(canvas.width / 20);
            const drps = Array(cols).fill(1);
            function mtrx() {
                ctx.fillStyle = "rgba(5, 8, 10, 0.1)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00ff66"; ctx.font = "15px monospace";
                drps.forEach((y, i) => {
                    ctx.fillText("01"[Math.floor(Math.random()*2)], i*20, y*15);
                    if (y*15 > canvas.height && Math.random() > 0.975) drps[i] = 0; drps[i]++;
                });
            }
            setInterval(mtrx, 50);

            // --- DESIGN SVG DES SPECTRES ---
            const svgRedSpectre = `
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#ff3366" stroke-width="4" stroke-dasharray="6,6"/>
                    <circle cx="50" cy="50" r="32" fill="#ff3366" opacity="0.2"/>
                    <circle cx="50" cy="50" r="20" fill="#ff3366"/>
                    <path d="M 50,20 L 50,80 M 20,50 L 80,50 M 30,30 L 70,70 M 30,70 L 70,30" stroke="#ffffff" stroke-width="3"/>
                    <circle cx="50" cy="50" r="8" fill="#ffffff"/>
                </svg>`;

            const svgBlueBonus = `
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#00ccff" stroke-width="4"/>
                    <circle cx="50" cy="50" r="30" fill="#00ccff" opacity="0.3"/>
                    <polygon points="50,15 63,38 88,50 63,62 50,85 37,62 12,50 37,38" fill="#00ccff"/>
                    <circle cx="50" cy="50" r="10" fill="#ffffff"/>
                </svg>`;

            const svgYellowTrap = `
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#ffcc00" stroke-width="4" stroke-dasharray="3,3"/>
                    <polygon points="50,18 82,80 18,80" fill="#ffcc00" opacity="0.4"/>
                    <text x="50" y="68" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">!</text>
                </svg>`;

            // --- LOGIQUE JEU ---
            window.startGame = function() {
                playMusic();
                score = 0;
                timeLeft = 35;
                gameActive = true;
                scoreEl.innerText = `${score} / ${targetScore}`;
                timerEl.innerText = `${timeLeft}s`;
                modalOverlay.style.display = 'none';

                gameInterval = setInterval(() => {
                    timeLeft--;
                    timerEl.innerText = `${timeLeft}s`;
                    if (timeLeft <= 0) endGame(false);
                }, 1000);
                spawn();
            };

            function spawn() {
                gameArea.innerHTML = '';
                if (!gameActive) return;

                const t = document.createElement('div');
                t.classList.add('target');

                // Probabilités : 70% Rouge (+1), 20% Bleu (+3), 10% Jaune (-1)
                const rand = Math.random();
                let points = 1;

                if (rand < 0.70) {
                    t.classList.add('red-spectre');
                    t.innerHTML = svgRedSpectre;
                    points = 1;
                } else if (rand < 0.88) {
                    t.classList.add('blue-bonus');
                    t.innerHTML = svgBlueBonus;
                    points = 3;
                } else {
                    t.classList.add('yellow-trap');
                    t.innerHTML = svgYellowTrap;
                    points = -1;
                }

                const maxX = gameArea.clientWidth - 90;
                const maxY = gameArea.clientHeight - 90;
                t.style.left = Math.max(10, Math.floor(Math.random() * maxX)) + "px";
                t.style.top = Math.max(10, Math.floor(Math.random() * maxY)) + "px";

                t.addEventListener('click', () => {
                    score += points;
                    if (score < 0) score = 0; // Pas de score négatif
                    scoreEl.innerText = `${score} / ${targetScore}`;

                    if (score >= targetScore) {
                        endGame(true);
                    } else {
                        clearTimeout(targetTimeout);
                        spawn();
                    }
                });

                gameArea.appendChild(t);
                targetTimeout = setTimeout(spawn, 1400); // Rythme très équilibré (1.4s)
            }

            function endGame(win) {
                gameActive = false;
                clearInterval(gameInterval);
                clearTimeout(targetTimeout);
                gameArea.innerHTML = '';
                modalOverlay.style.display = 'flex';

                if (win) {
                    modalTitle.innerText = "🎉 TOUR DÉSACTIVÉE !";
                    modalTitle.style.color = "var(--lyoko-green)";
                    modalText.innerText = "Bravo Agent ! Tu as repoussé X.A.N.A. et sauvé le Supercalculateur !";
                    modalButtons.innerHTML = `
                        <button class="btn btn-blue" onclick="window.location.href='index.html'">👤 ENFANT SUIVANT</button>
                    `;
                } else {
                    modalTitle.innerText = "❌ ÉCHEC MISSION";
                    modalTitle.style.color = "var(--error-red)";
                    modalText.innerText = "X.A.N.A. a pris le contrôle ! Veux-tu réessayer ou passer la main ?";
                    modalButtons.innerHTML = `
                        <button class="btn btn-green" onclick="startGame()">🔄 RÉESSAYER</button>
                        <button class="btn btn-blue" onclick="window.location.href='index.html'">👤 ENFANT SUIVANT</button>
                    `;
                }
            }
        });
    </script>
</body>
</html>
