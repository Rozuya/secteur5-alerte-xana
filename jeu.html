<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secteur 5 - Mission Alerte X.A.N.A.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lyoko-green: #00ff66;
            --lyoko-blue: #00ccff;
            --bg-dark: #05080a;
            --error-red: #ff3366;
            --warning-yellow: #ffcc00;
            --text-main: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background-color: var(--bg-dark);
            color: var(--lyoko-green);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* FOND MATRIX */
        #matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; opacity: 0.25; pointer-events: none;
        }

        /* BARRE AUDIO */
        .audio-controls {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(8, 12, 20, 0.95);
            border: 2px solid var(--lyoko-blue);
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 50;
        }

        .music-btn {
            background: var(--lyoko-blue);
            color: #000; border: none; padding: 8px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold; font-size: 0.85rem;
            cursor: pointer; border-radius: 5px;
            touch-action: manipulation;
        }

        input[type="range"] { accent-color: var(--lyoko-green); width: 70px; cursor: pointer; }

        /* HEADER SCORE & CHRONO */
        .top-container {
            position: relative; z-index: 10;
            width: 100%; padding-top: 55px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            flex-shrink: 0;
        }

        .game-header {
            background: rgba(8, 12, 20, 0.92);
            border: 2px solid var(--lyoko-blue);
            border-radius: 12px;
            padding: 10px 25px;
            display: flex; gap: 30px;
            box-shadow: 0 0 20px rgba(0, 204, 255, 0.4);
        }

        .stat-box { text-align: center; }
        .stat-title { font-size: 0.8rem; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: var(--lyoko-green); }
        .stat-value.red { color: var(--error-red); }

        .mini-rules-bar {
            background: rgba(8, 12, 20, 0.85);
            border: 1px dashed var(--lyoko-blue);
            border-radius: 8px;
            padding: 6px 16px;
            display: flex; gap: 16px;
            font-size: 0.9rem; color: var(--text-main); font-weight: bold;
        }

        /* ZONE DE JEU */
        .game-area {
            position: relative; width: 100%; flex: 1;
            z-index: 10; overflow: hidden;
            touch-action: manipulation;
        }

        /* CIBLES (85px) */
        .target {
            position: absolute;
            width: 85px; height: 85px;
            cursor: pointer; border-radius: 50%; display: block;
            z-index: 20; touch-action: manipulation;
            animation: spawnAnim 0.2s ease-out;
        }

        @keyframes spawnAnim {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .target.red-spectre { filter: drop-shadow(0 0 12px var(--error-red)); }
        .target.blue-bonus { filter: drop-shadow(0 0 15px var(--lyoko-blue)); animation: pulse 0.5s infinite alternate; }
        .target.yellow-trap { filter: drop-shadow(0 0 12px var(--warning-yellow)); }

        @keyframes pulse { from { transform: scale(0.92); } to { transform: scale(1.12); } }

        /* MODALE FIN DE PARTIE */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }

        .modal {
            background: #0a1118; border: 3px solid var(--lyoko-blue);
            border-radius: 12px; padding: 28px; text-align: center;
            max-width: 420px; width: 90%; box-shadow: 0 0 35px var(--lyoko-blue);
        }

        .modal h2 { font-size: 1.8rem; margin-bottom: 12px; text-transform: uppercase; }
        .modal p { color: #fff; font-size: 1.1rem; margin-bottom: 22px; line-height: 1.4; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            padding: 14px 20px; font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem; font-weight: bold; border: none;
            border-radius: 6px; cursor: pointer; text-transform: uppercase;
            touch-action: manipulation;
        }
        .btn-green { background: var(--lyoko-green); color: #000; box-shadow: 0 0 10px var(--lyoko-green); }
        .btn-blue { background: var(--lyoko-blue); color: #000; box-shadow: 0 0 10px var(--lyoko-blue); }

        @media (max-width: 480px) {
            .target { width: 75px; height: 75px; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="audio-controls">
        <button id="toggle-music" class="music-btn">🔊 MUSIQUE : ON</button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="Alerte.XANA.mp3" type="audio/mpeg">
    </audio>

    <div class="top-container">
        <div class="game-header">
            <div class="stat-box">
                <div class="stat-title">SCORE</div>
                <div class="stat-value" id="score">0 / 25</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">CHRONO</div>
                <div class="stat-value red" id="timer">35s</div>
            </div>
        </div>

        <div class="mini-rules-bar">
            <span>🔴 +1pt</span>
            <span>🔵 +3pts</span>
            <span>🟠 -1pt</span>
        </div>
    </div>

    <div class="game-area" id="game-area"></div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title"></h2>
            <p id="modal-text"></p>
            <div class="btn-group" id="modal-buttons"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-music');
            const musicBtn = document.getElementById('toggle-music');
            const volumeSlider = document.getElementById('volume-slider');
            const gameArea = document.getElementById('game-area');
            const scoreEl = document.getElementById('score');
            const timerEl = document.getElementById('timer');
            const modalOverlay = document.getElementById('modal-overlay');
            const modalTitle = document.getElementById('modal-title');
            const modalText = document.getElementById('modal-text');
            const modalButtons = document.getElementById('modal-buttons');

            // --- RÉGLAGES GAMEPLAY ---
            let score = 0;
            const targetScore = 25;
            let timeLeft = 35;
            const targetDuration = 2500;
            let gameActive = false;
            let gameInterval = null;
            let targetTimeout = null;

            // --- DECLENCHEMENT AUDIO INFALLIBLE ---
            audio.volume = parseFloat(volumeSlider.value);
            volumeSlider.addEventListener('input', () => {
                audio.volume = parseFloat(volumeSlider.value);
            });

            function startMusic() {
                audio.play().then(() => {
                    musicBtn.innerText = "🔊 MUSIQUE : ON";
                    musicBtn.style.background = "var(--lyoko-blue)";
                    musicBtn.style.color = "#000";
                }).catch(() => {
                    musicBtn.innerText = "🔇 MUSIQUE : OFF";
                    musicBtn.style.background = "var(--error-red)";
                    musicBtn.style.color = "#fff";
                });
            }

            // Déblocage immédiat dès la première interaction globale
            const unlockAudioOnTouch = () => {
                if (audio.paused) {
                    startMusic();
                }
                window.removeEventListener('pointerdown', unlockAudioOnTouch);
                window.removeEventListener('touchstart', unlockAudioOnTouch);
            };

            window.addEventListener('pointerdown', unlockAudioOnTouch, { once: true });
            window.addEventListener('touchstart', unlockAudioOnTouch, { once: true });

            musicBtn.addEventListener('click', () => {
                if (audio.paused) startMusic(); else {
                    audio.pause();
                    musicBtn.innerText = "🔇 MUSIQUE : OFF";
                    musicBtn.style.background = "var(--error-red)";
                    musicBtn.style.color = "#fff";
                }
            });

            // --- FOND ANIMÉ MATRIX ---
            const canvas = document.getElementById('matrix-bg');
            const ctx = canvas.getContext('2d');
            function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', res); res();
            let drops = Array(Math.floor(canvas.width / 16)).fill(1);

            setInterval(() => {
                ctx.fillStyle = "rgba(5, 8, 10, 0.12)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00ff66"; ctx.font = "16px monospace";
                drops.forEach((y, i) => {
                    ctx.fillText("01"[Math.floor(Math.random()*2)], i * 16, y * 16);
                    if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }, 45);

            // --- SVGs DES CIBLES ---
            const svgRed = `<svg viewBox="0 0 100 100" width="100%" height="100%"><circle cx="50" cy="50" r="42" fill="none" stroke="#ff3366" stroke-width="5" stroke-dasharray="6,6"/><circle cx="50" cy="50" r="32" fill="#ff3366" opacity="0.25"/><circle cx="50" cy="50" r="20" fill="#ff3366"/><line x1="50" y1="12" x2="50" y2="88" stroke="#ffffff" stroke-width="3"/><line x1="12" y1="50" x2="88" y2="50" stroke="#ffffff" stroke-width="3"/><circle cx="50" cy="50" r="7" fill="#ffffff"/></svg>`;
            const svgBlue = `<svg viewBox="0 0 100 100" width="100%" height="100%"><circle cx="50" cy="50" r="42" fill="none" stroke="#00ccff" stroke-width="5"/><circle cx="50" cy="50" r="30" fill="#00ccff" opacity="0.35"/><polygon points="50,15 63,38 88,50 63,62 50,85 37,62 12,50 37,38" fill="#00ccff"/><circle cx="50" cy="50" r="10" fill="#ffffff"/></svg>`;
            const svgYellow = `<svg viewBox="0 0 100 100" width="100%" height="100%"><circle cx="50" cy="50" r="42" fill="none" stroke="#ffcc00" stroke-width="5"/><polygon points="50,18 82,80 18,80" fill="#ffcc00" opacity="0.45"/><text x="50" y="68" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">!</text></svg>`;

            // --- DÉMARRAGE DE PARTIE ---
            function startGame() {
                startMusic();
                score = 0;
                timeLeft = 35;
                gameActive = true;
                scoreEl.innerText = `${score} / ${targetScore}`;
                timerEl.innerText = `${timeLeft}s`;
                modalOverlay.style.display = 'none';

                if (gameInterval) clearInterval(gameInterval);
                if (targetTimeout) clearTimeout(targetTimeout);

                gameInterval = setInterval(() => {
                    timeLeft--;
                    timerEl.innerText = `${timeLeft}s`;
                    if (timeLeft <= 0) endGame(false);
                }, 1000);

                spawn();
            }

            // --- APPARITION DES CIBLES ---
            function spawn() {
                gameArea.innerHTML = '';
                if (!gameActive) return;

                const t = document.createElement('div');
                t.classList.add('target');

                const rand = Math.random();
                let points = 1;

                if (rand < 0.60) {
                    t.classList.add('red-spectre'); t.innerHTML = svgRed; points = 1;
                } else if (rand < 0.85) {
                    t.classList.add('blue-bonus'); t.innerHTML = svgBlue; points = 3;
                } else {
                    t.classList.add('yellow-trap'); t.innerHTML = svgYellow; points = -1;
                }

                const w = gameArea.clientWidth || window.innerWidth;
                const h = gameArea.clientHeight || (window.innerHeight * 0.6);

                const targetSize = window.innerWidth <= 480 ? 75 : 85;
                const maxX = Math.max(10, w - targetSize - 15);
                const maxY = Math.max(10, h - targetSize - 15);

                t.style.left = Math.floor(Math.random() * maxX) + "px";
                t.style.top = Math.floor(Math.random() * maxY) + "px";

                let hit = false;
                const onHit = (e) => {
                    if (e) { e.preventDefault(); e.stopPropagation(); }
                    if (hit || !gameActive) return;
                    hit = true;

                    // Si la musique n'a pas encore démarré, le premier clic la lance
                    if (audio.paused) startMusic();

                    score += points;
                    if (score < 0) score = 0;
                    scoreEl.innerText = `${score} / ${targetScore}`;

                    if (score >= targetScore) {
                        endGame(true);
                    } else {
                        if (targetTimeout) clearTimeout(targetTimeout);
                        spawn();
                    }
                };

                t.addEventListener('pointerdown', onHit);
                gameArea.appendChild(t);

                targetTimeout = setTimeout(() => {
                    if (gameActive) spawn();
                }, targetDuration);
            }

            // --- FIN DE PARTIE ---
            function endGame(win) {
                gameActive = false;
                if (gameInterval) clearInterval(gameInterval);
                if (targetTimeout) clearTimeout(targetTimeout);
                
                gameArea.innerHTML = '';
                modalOverlay.style.display = 'flex';

                if (win) {
                    modalTitle.innerText = "🎉 TOUR DÉSACTIVÉE !";
                    modalTitle.style.color = "var(--lyoko-green)";
                    modalText.innerText = "Bravo Agent ! Tu as repoussé X.A.N.A. et sauvé le Supercalculateur !";
                    modalButtons.innerHTML = `<button class="btn btn-blue" id="next-btn">👤 ENFANT SUIVANT</button>`;
                } else {
                    modalTitle.innerText = "❌ ÉCHEC MISSION";
                    modalTitle.style.color = "var(--error-red)";
                    modalText.innerText = "Le temps est écoulé ! X.A.N.A. a pris le contrôle !";
                    modalButtons.innerHTML = `
                        <button class="btn btn-green" id="retry-btn">🔄 RÉESSAYER</button>
                        <button class="btn btn-blue" id="next-btn">👤 ENFANT SUIVANT</button>
                    `;
                }

                const retryBtn = document.getElementById('retry-btn');
                const nextBtn = document.getElementById('next-btn');

                if (retryBtn) retryBtn.addEventListener('click', startGame);
                if (nextBtn) nextBtn.addEventListener('click', () => { window.location.href = 'index.html'; });
            }

            // Démarrage initial
            startGame();
        });
    </script>
</body>
</html>
