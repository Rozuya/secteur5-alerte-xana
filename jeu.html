<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secteur 5 - Mission Alerte X.A.N.A.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lyoko-green: #00ff66;
            --lyoko-blue: #00ccff;
            --bg-dark: #05080a;
            --error-red: #ff3366;
            --warning-yellow: #ffcc00;
            --text-main: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background-color: var(--bg-dark);
            color: var(--lyoko-green);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* FOND MATRIX */
        #matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; opacity: 0.25; pointer-events: none;
        }

        /* BARRE AUDIO */
        .audio-controls {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(8, 12, 20, 0.95);
            border: 2px solid var(--lyoko-blue);
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 50;
        }

        .music-btn {
            background: var(--lyoko-blue);
            color: #000; border: none; padding: 8px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold; font-size: 0.85rem;
            cursor: pointer; border-radius: 5px;
        }

        input[type="range"] { accent-color: var(--lyoko-green); width: 70px; }

        /* HEADER SCORE & CHRONO */
        .top-container {
            position: relative; z-index: 10;
            width: 100%; padding-top: 55px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .game-header {
            background: rgba(8, 12, 20, 0.92);
            border: 2px solid var(--lyoko-blue);
            border-radius: 12px;
            padding: 10px 25px;
            display: flex; gap: 30px;
            box-shadow: 0 0 20px rgba(0, 204, 255, 0.4);
        }

        .stat-box { text-align: center; }
        .stat-title { font-size: 0.8rem; color: #fff; text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: var(--lyoko-green); }
        .stat-value.red { color: var(--error-red); }

        /* ZONE DE JEU */
        .game-area {
            position: relative; width: 100%; flex: 1;
            z-index: 10; overflow: hidden;
            touch-action: manipulation;
        }

        /* CIBLES (85px) */
        .target {
            position: absolute;
            width: 85px; height: 85px;
            cursor: pointer; z-index: 20;
            animation: spawnAnim 0.2s ease-out;
        }

        @keyframes spawnAnim {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .target.red-spectre { filter: drop-shadow(0 0 12px var(--error-red)); }
        .target.blue-bonus { filter: drop-shadow(0 0 15px var(--lyoko-blue)); animation: pulse 0.5s infinite alternate; }
        .target.yellow-trap { filter: drop-shadow(0 0 12px var(--warning-yellow)); }

        @keyframes pulse { from { transform: scale(0.95); } to { transform: scale(1.1); } }

        /* MODALE FIN */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }

        .modal {
            background: #0a1118; border: 3px solid var(--lyoko-blue);
            border-radius: 12px; padding: 30px; text-align: center;
            max-width: 420px; width: 90%; box-shadow: 0 0 35px var(--lyoko-blue);
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn {
            padding: 15px; font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem; font-weight: bold; border: none;
            border-radius: 6px; cursor: pointer; text-transform: uppercase;
        }
        .btn-green { background: var(--lyoko-green); color: #000; }
        .btn-blue { background: var(--lyoko-blue); color: #000; }

        @media (max-width: 480px) {
            .target { width: 75px; height: 75px; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="audio-controls">
        <button id="toggle-music" class="music-btn">🔊 MUSIQUE : ON</button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="Alerte.XANA.mp3" type="audio/mpeg">
    </audio>

    <div class="top-container">
        <div class="game-header">
            <div class="stat-box">
                <div class="stat-title">SCORE</div>
                <div class="stat-value" id="score">0 / 25</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">CHRONO</div>
                <div class="stat-value red" id="timer">35s</div>
            </div>
        </div>
    </div>

    <div class="game-area" id="game-area"></div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title"></h2>
            <p id="modal-text" style="color:white; margin: 15px 0;"></p>
            <div class="btn-group" id="modal-buttons"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-music');
            const musicBtn = document.getElementById('toggle-music');
            const volumeSlider = document.getElementById('volume-slider');
            const gameArea = document.getElementById('game-area');
            const scoreEl = document.getElementById('score');
            const timerEl = document.getElementById('timer');
            const modalOverlay = document.getElementById('modal-overlay');

            // --- REGLAGES MISSION ---
            let score = 0;
            const targetScore = 25; // OBJECTIF AUGMENTÉ
            let timeLeft = 35;
            const targetDuration = 2500; // Cible reste 2.5s
            let gameActive = false;
            let gameInterval = null;
            let targetTimeout = null;

            // Audio Logic
            audio.volume = 0.5;
            musicBtn.onclick = () => {
                if (audio.paused) { audio.play(); musicBtn.innerText = "🔊 ON"; }
                else { audio.pause(); musicBtn.innerText = "🔇 OFF"; }
            };
            volumeSlider.oninput = () => audio.volume = volumeSlider.value;

            // SVGs
            const svgRed = `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#ff3366" stroke-width="5" stroke-dasharray="6,6"/><circle cx="50" cy="50" r="20" fill="#ff3366"/><line x1="50" y1="12" x2="50" y2="88" stroke="white" stroke-width="3"/><line x1="12" y1="50" x2="88" y2="50" stroke="white" stroke-width="3"/></svg>`;
            const svgBlue = `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#00ccff" stroke-width="5"/><polygon points="50,15 63,38 88,50 63,62 50,85 37,62 12,50 37,38" fill="#00ccff"/><circle cx="50" cy="50" r="10" fill="white"/></svg>`;
            const svgYellow = `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#ffcc00" stroke-width="5"/><polygon points="50,18 82,80 18,80" fill="#ffcc00" opacity="0.5"/><text x="50" y="68" font-size="40" fill="white" text-anchor="middle" font-weight="bold">!</text></svg>`;

            function startGame() {
                score = 0; timeLeft = 35; gameActive = true;
                scoreEl.innerText = `0 / ${targetScore}`;
                timerEl.innerText = "35s";
                modalOverlay.style.display = 'none';
                gameInterval = setInterval(() => {
                    timeLeft--;
                    timerEl.innerText = timeLeft + "s";
                    if (timeLeft <= 0) endGame(false);
                }, 1000);
                spawn();
            }

            function spawn() {
                gameArea.innerHTML = '';
                if (!gameActive) return;

                const t = document.createElement('div');
                t.className = 'target';
                const rand = Math.random();
                let pts = 1;

                if (rand < 0.6) { t.innerHTML = svgRed; t.classList.add('red-spectre'); pts = 1; }
                else if (rand < 0.85) { t.innerHTML = svgBlue; t.classList.add('blue-bonus'); pts = 3; }
                else { t.innerHTML = svgYellow; t.classList.add('yellow-trap'); pts = -1; }

                const maxX = gameArea.clientWidth - 90;
                const maxY = gameArea.clientHeight - 90;
                t.style.left = Math.random() * maxX + "px";
                t.style.top = Math.random() * maxY + "px";

                t.onpointerdown = (e) => {
                    e.preventDefault();
                    score += pts;
                    if (score < 0) score = 0;
                    scoreEl.innerText = `${score} / ${targetScore}`;
                    if (score >= targetScore) endGame(true);
                    else { clearTimeout(targetTimeout); spawn(); }
                };

                gameArea.appendChild(t);
                targetTimeout = setTimeout(spawn, targetDuration);
            }

            function endGame(win) {
                gameActive = false;
                clearInterval(gameInterval);
                clearTimeout(targetTimeout);
                modalOverlay.style.display = 'flex';
                document.getElementById('modal-title').innerText = win ? "PARTIE GAGNÉE !" : "TEMPS ÉCOULÉ !";
                document.getElementById('modal-text').innerText = win ? "X.A.N.A. est repoussé !" : "La tour est restée activée...";
                document.getElementById('modal-buttons').innerHTML = `
                    <button class="btn btn-green" onclick="location.reload()">REJOUER</button>
                    <button class="btn btn-blue" onclick="location.href='index.html'">RETOUR</button>
                `;
            }

            // Matrix Background Logic
            const canvas = document.getElementById('matrix-bg');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const letters = "01".split("");
            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);
            function drawMatrix() {
                ctx.fillStyle = "rgba(5, 8, 10, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00ff66"; ctx.font = fontSize + "px monospace";
                drops.forEach((y, i) => {
                    const text = letters[Math.floor(Math.random() * letters.length)];
                    ctx.fillText(text, i * fontSize, y * fontSize);
                    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }
            setInterval(drawMatrix, 50);

            startGame();
        });
    </script>
</body>
</html>
