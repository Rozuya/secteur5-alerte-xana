<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secteur 5 - Mission Alerte X.A.N.A.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lyoko-green: #00ff66;
            --lyoko-blue: #00ccff;
            --bg-dark: #05080a;
            --error-red: #ff3366;
            --text-main: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--lyoko-green);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        /* BARRE D'AUDIO EN HAUT */
        .audio-controls {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(8, 12, 20, 0.95);
            border: 1px solid var(--lyoko-blue);
            border-radius: 8px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 50;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.3);
        }

        .music-btn {
            background: var(--error-red);
            color: #ffffff;
            border: none;
            padding: 6px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--lyoko-blue);
            font-size: 0.9rem;
        }

        input[type="range"] {
            accent-color: var(--lyoko-green);
            cursor: pointer;
            width: 80px;
        }

        /* TABLEAU DE BORD */
        .game-header {
            margin-top: 20px;
            background: rgba(8, 12, 20, 0.9);
            border: 2px solid var(--lyoko-blue);
            border-radius: 10px;
            padding: 12px 25px;
            display: flex;
            gap: 30px;
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.3);
        }

        .stat-box { text-align: center; }
        .stat-title { font-size: 0.8rem; color: #fff; text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: var(--lyoko-green); }
        .stat-value.red { color: var(--error-red); }

        /* ZONE DE JEU */
        .game-area {
            position: relative;
            width: 100%;
            height: 75vh;
            z-index: 10;
        }

        .target {
            position: absolute;
            width: 85px;
            height: 85px;
            background: radial-gradient(circle, var(--error-red) 30%, #a00 90%);
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 25px var(--error-red);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            animation: pulse 0.8s infinite alternate;
            touch-action: manipulation;
        }

        @keyframes pulse {
            from { transform: scale(0.9); }
            to { transform: scale(1.1); }
        }

        /* MODALE */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: #0a1118;
            border: 3px solid var(--lyoko-blue);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 0 35px var(--lyoko-blue);
        }

        .modal h2 { font-size: 2rem; margin-bottom: 15px; text-transform: uppercase; }
        .modal p { color: #fff; font-size: 1.2rem; margin-bottom: 25px; line-height: 1.5; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 15px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-green { background: var(--lyoko-green); color: #000; box-shadow: 0 0 10px var(--lyoko-green); }
        .btn-blue { background: var(--lyoko-blue); color: #000; box-shadow: 0 0 10px var(--lyoko-blue); }
        .btn-red { background: var(--error-red); color: #fff; }

        .btn:hover { transform: scale(1.05); opacity: 0.9; }

        @media (max-width: 480px) {
            .stat-value { font-size: 1.4rem; }
            .target { width: 75px; height: 75px; font-size: 2rem; }
            .modal h2 { font-size: 1.6rem; }
            .game-header { gap: 15px; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="Alerte.XANA.mp3" type="audio/mpeg">
    </audio>

    <div class="audio-controls">
        <button id="toggle-music" class="music-btn">🔇 MUSIQUE : OFF</button>
        <div class="volume-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            <span id="volume-text">50%</span>
        </div>
    </div>

    <div class="game-header">
        <div class="stat-box">
            <div class="stat-title">SPECTRES</div>
            <div class="stat-value" id="score">0 / 10</div>
        </div>
        <div class="stat-box">
            <div class="stat-title">CHRONO</div>
            <div class="stat-value red" id="timer">30s</div>
        </div>
    </div>

    <div class="game-area" id="game-area"></div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title" style="color: var(--lyoko-blue);">MISSION : SECTEUR 5</h2>
            <p id="modal-text">Clique sur 10 spectres rouges 👁️ avant la fin du temps pour sauver le Supercalculateur !</p>
            <div class="btn-group" id="modal-buttons">
                <button class="btn btn-green" onclick="startGame()">▶️ JOUER</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-music');
            const musicBtn = document.getElementById('toggle-music');
            const volumeSlider = document.getElementById('volume-slider');
            const volumeText = document.getElementById('volume-text');
            const gameArea = document.getElementById('game-area');
            const scoreEl = document.getElementById('score');
            const timerEl = document.getElementById('timer');
            const modalOverlay = document.getElementById('modal-overlay');
            const modalTitle = document.getElementById('modal-title');
            const modalText = document.getElementById('modal-text');
            const modalButtons = document.getElementById('modal-buttons');

            let score = 0;
            const targetScore = 10;
            let timeLeft = 30;
            let gameActive = false;
            let gameInterval, targetTimeout;

            // --- MUSIQUE & VOLUME ---
            audio.volume = parseFloat(volumeSlider.value);
            function updateVol() {
                audio.volume = parseFloat(volumeSlider.value);
                volumeText.innerText = Math.round(audio.volume * 100) + "%";
            }
            volumeSlider.addEventListener('input', updateVol);

            function playMusic() {
                audio.play().then(() => {
                    musicBtn.innerText = "🔊 MUSIQUE : ON";
                    musicBtn.style.background = "var(--lyoko-blue)";
                    musicBtn.style.color = "#000";
                }).catch(e => console.log("Audio bloqué"));
            }

            function stopMusic() {
                audio.pause();
                musicBtn.innerText = "🔇 MUSIQUE : OFF";
                musicBtn.style.background = "var(--error-red)";
                musicBtn.style.color = "#fff";
            }

            musicBtn.addEventListener('click', () => {
                if (audio.paused) playMusic(); else stopMusic();
            });

            // --- MATRIX ---
            const canvas = document.getElementById('matrix-bg');
            const ctx = canvas.getContext('2d');
            function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', res); res();
            const cols = Math.floor(canvas.width / 20);
            const drps = Array(cols).fill(1);
            function mtrx() {
                ctx.fillStyle = "rgba(5, 8, 10, 0.1)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00ff66"; ctx.font = "15px monospace";
                drps.forEach((y, i) => {
                    ctx.fillText("01"[Math.floor(Math.random()*2)], i*20, y*15);
                    if (y*15 > canvas.height && Math.random() > 0.975) drps[i] = 0; drps[i]++;
                });
            }
            setInterval(mtrx, 50);

            // --- LOGIQUE JEU ---
            window.startGame = function() {
                playMusic();
                score = 0;
                timeLeft = 30;
                gameActive = true;
                scoreEl.innerText = `0 / ${targetScore}`;
                timerEl.innerText = `${timeLeft}s`;
                modalOverlay.style.display = 'none';

                gameInterval = setInterval(() => {
                    timeLeft--;
                    timerEl.innerText = `${timeLeft}s`;
                    if (timeLeft <= 0) endGame(false);
                }, 1000);
                spawn();
            };

            function spawn() {
                gameArea.innerHTML = '';
                if (!gameActive) return;

                const t = document.createElement('div');
                t.classList.add('target');
                t.innerText = '👁️';

                const maxX = gameArea.clientWidth - 95;
                const maxY = gameArea.clientHeight - 95;
                t.style.left = Math.max(10, Math.floor(Math.random() * maxX)) + "px";
                t.style.top = Math.max(10, Math.floor(Math.random() * maxY)) + "px";

                t.addEventListener('click', () => {
                    score++;
                    scoreEl.innerText = `${score} / ${targetScore}`;
                    if (score >= targetScore) endGame(true);
                    else { clearTimeout(targetTimeout); spawn(); }
                });

                gameArea.appendChild(t);
                targetTimeout = setTimeout(spawn, 1500); 
            }

            function endGame(win) {
                gameActive = false;
                clearInterval(gameInterval);
                clearTimeout(targetTimeout);
                gameArea.innerHTML = '';
                modalOverlay.style.display = 'flex';

                if (win) {
                    modalTitle.innerText = "🎉 VICTOIRE !";
                    modalTitle.style.color = "var(--lyoko-green)";
                    modalText.innerText = "Bravo Agent ! Les tours sont désactivées. Le Supercalculateur est sauvé !";
                    modalButtons.innerHTML = `
                        <button class="btn btn-blue" onclick="window.location.href='index.html'">👤 ENFANT SUIVANT</button>
                    `;
                } else {
                    modalTitle.innerText = "❌ ÉCHEC MISSION";
                    modalTitle.style.color = "var(--error-red)";
                    modalText.innerText = "X.A.N.A. a gagné ! Le temps est écoulé. Veux-tu réessayer ou laisser la place ?";
                    modalButtons.innerHTML = `
                        <button class="btn btn-green" onclick="startGame()">🔄 RÉESSAYER</button>
                        <button class="btn btn-blue" onclick="window.location.href='index.html'">👤 ENFANT SUIVANT</button>
                    `;
                }
            }
        });
    </script>
</body>
</html>
