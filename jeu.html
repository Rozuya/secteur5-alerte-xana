<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secteur 5 - Mission Alerte X.A.N.A.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lyoko-green: #00ff66;
            --lyoko-blue: #00ccff;
            --bg-dark: #05080a;
            --error-red: #ff3366;
            --warning-yellow: #ffcc00;
            --text-main: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--lyoko-green);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        /* BARRE AUDIO EN HAUT */
        .audio-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(8, 12, 20, 0.95);
            border: 1px solid var(--lyoko-blue);
            border-radius: 8px;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 50;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.3);
        }

        .music-btn {
            background: var(--lyoko-blue);
            color: #000;
            border: none;
            padding: 6px 10px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            touch-action: manipulation;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--lyoko-blue);
            font-size: 0.8rem;
        }

        input[type="range"] {
            accent-color: var(--lyoko-green);
            cursor: pointer;
            width: 60px;
        }

        /* BANDEAU EN-TÊTE ET RÈGLES */
        .top-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }

        .game-header {
            background: rgba(8, 12, 20, 0.9);
            border: 2px solid var(--lyoko-blue);
            border-radius: 10px;
            padding: 6px 18px;
            display: flex;
            gap: 20px;
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.3);
        }

        .stat-box { text-align: center; }
        .stat-title { font-size: 0.7rem; color: #fff; text-transform: uppercase; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--lyoko-green); }
        .stat-value.red { color: var(--error-red); }

        .mini-rules-bar {
            background: rgba(8, 12, 20, 0.85);
            border: 1px dashed var(--lyoko-blue);
            border-radius: 6px;
            padding: 3px 10px;
            display: flex;
            gap: 10px;
            font-size: 0.75rem;
            color: var(--text-main);
        }

        /* ZONE DE JEU */
        .game-area {
            position: relative;
            width: 100%;
            flex-grow: 1;
            z-index: 10;
            overflow: hidden;
        }

        /* CIBLES SVG */
        .target {
            position: absolute;
            width: 75px;
            height: 75px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            animation: spawnAnim 0.15s ease-out;
        }

        @keyframes spawnAnim {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .target.red-spectre { filter: drop-shadow(0 0 12px var(--error-red)); }
        .target.blue-bonus { 
            filter: drop-shadow(0 0 15px var(--lyoko-blue)); 
            animation: pulseBonus 0.4s infinite alternate; 
        }
        .target.yellow-trap { filter: drop-shadow(0 0 12px var(--warning-yellow)); }

        @keyframes pulseBonus {
            from { transform: scale(0.9); }
            to { transform: scale(1.15); }
        }

        /* FENÊTRE FIN DE PARTIE */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: #0a1118;
            border: 3px solid var(--lyoko-blue);
            border-radius: 10px;
            padding: 22px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 0 30px var(--lyoko-blue);
        }

        .modal h2 { font-size: 1.6rem; margin-bottom: 10px; text-transform: uppercase; }
        .modal p { color: #fff; font-size: 1rem; margin-bottom: 18px; line-height: 1.4; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        .btn {
            padding: 12px 18px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            touch-action: manipulation;
        }

        .btn-green { background: var(--lyoko-green); color: #000; box-shadow: 0 0 10px var(--lyoko-green); }
        .btn-blue { background: var(--lyoko-blue); color: #000; box-shadow: 0 0 10px var(--lyoko-blue); }

        .btn:active { transform: scale(0.96); }

        @media (max-width: 480px) {
            .target { width: 70px; height: 70px; }
            .volume-container span { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <audio id="bg-music" loop preload="auto">
        <source src="Alerte.XANA.mp3" type="audio/mpeg">
    </audio>

    <div class="audio-controls">
        <button id="toggle-music" class="music-btn">🔊 MUSIQUE : ON</button>
        <div class="volume-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            <span id="volume-text">50%</span>
        </div>
    </div>

    <div class="top-container">
        <div class="game-header">
            <div class="stat-box">
                <div class="stat-title">SCORE</div>
                <div class="stat-value" id="score">0 / 15</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">CHRONO</div>
                <div class="stat-value red" id="timer">35s</div>
            </div>
        </div>

        <div class="mini-rules-bar">
            <span>🔴 +1pt</span>
            <span>🔵 +3pts</span>
            <span>🟠 -1pt</span>
        </div>
    </div>

    <div class="game-area" id="game-area"></div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title"></h2>
            <p id="modal-text"></p>
            <div class="btn-group" id="modal-buttons"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-music');
            const musicBtn = document.getElementById('toggle-music');
            const volumeSlider = document.getElementById('volume-slider');
            const volumeText = document.getElementById('volume-text');
            const gameArea = document.getElementById('game-area');
            const scoreEl = document.getElementById('score');
            const timerEl = document.getElementById('timer');
            const modalOverlay = document.getElementById('modal-overlay');
            const modalTitle = document.getElementById('modal-title');
            const modalText = document.getElementById('modal-text');
            const modalButtons = document.getElementById('modal-buttons');

            let score = 0;
            const targetScore = 15;
            let timeLeft = 35;
            let gameActive = false;
            let gameInterval = null;
            let targetTimeout = null;

            // --- GESTION AUDIO ---
            audio.volume = parseFloat(volumeSlider.value);

            function updateVol() {
                audio.volume = parseFloat(volumeSlider.value);
                if (volumeText) volumeText.innerText = Math.round(audio.volume * 100) + "%";
            }
            volumeSlider.addEventListener('input', updateVol);

            function playMusic() {
                audio.play().then(() => {
                    musicBtn.innerText = "🔊 MUSIQUE : ON";
                    musicBtn.style.background = "var(--lyoko-blue)";
                    musicBtn.style.color = "#000";
                }).catch(() => {
                    musicBtn.innerText = "🔇 MUSIQUE : OFF";
                    musicBtn.style.background = "var(--error-red)";
                    musicBtn.style.color = "#fff";
                });
            }

            function stopMusic() {
                audio.pause();
                musicBtn.innerText = "🔇 MUSIQUE : OFF";
                musicBtn.style.background = "var(--error-red)";
                musicBtn.style.color = "#fff";
            }

            musicBtn.addEventListener('click', () => {
                if (audio.paused) playMusic(); else stopMusic();
            });

            // --- ANIMATION FOND (MATRIX) ---
            const canvas = document.getElementById('matrix-bg');
            const ctx = canvas.getContext('2d');
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const fontSize = 16;
            let cols = Math.floor(canvas.width / fontSize);
            let drops = Array(cols).fill(1);

            function drawMatrix() {
                ctx.fillStyle = "rgba(5, 8, 10, 0.1)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00ff66";
                ctx.font = fontSize + "px monospace";

                drops.forEach((y, i) => {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, y * fontSize);
                    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }
            setInterval(drawMatrix, 45);

            // --- GRAPHISMES SVG ---
            const svgRed = `<svg viewBox="0 0 100 100" width="100%" height="100%"><circle cx="50" cy="50" r="42" fill="none" stroke="#ff3366" stroke-width="4" stroke-dasharray="6,6"/><circle cx="50" cy="50" r="32" fill="#ff3366" opacity="0.2"/><circle cx="50" cy="50" r="20" fill="#ff3366"/><path d="M 50,20 L 50,80 M 20,50 L 80,50" stroke="#ffffff" stroke-width="3"/><circle cx="50" cy="50" r="8" fill="#ffffff"/></svg>`;
            const svgBlue = `<svg viewBox="0 0 100 100" width="100%" height="100%"><circle cx="50" cy="50" r="42" fill="none" stroke="#00ccff" stroke-width="4"/><circle cx="50" cy="50" r="30" fill="#00ccff" opacity="0.3"/><polygon points="50,15 63,38 88,50 63,62 50,85 37,62 12,50 37,38" fill="#00ccff"/><circle cx="50" cy="50" r="10" fill="#ffffff"/></svg>`;
            const svgYellow = `<svg viewBox="0 0 100 100" width="100%" height="100%"><circle cx="50" cy="50" r="42" fill="none" stroke="#ffcc00" stroke-width="4"/><polygon points="50,18 82,80 18,80" fill="#ffcc00" opacity="0.4"/><text x="50" y="68" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">!</text></svg>`;

            // --- LOGIQUE DÉROULEMENT DU JEU ---
            function startGame() {
                playMusic();
                score = 0;
                timeLeft = 35;
                gameActive = true;
                scoreEl.innerText = `${score} / ${targetScore}`;
                timerEl.innerText = `${timeLeft}s`;
                modalOverlay.style.display = 'none';

                if (gameInterval) clearInterval(gameInterval);
                if (targetTimeout) clearTimeout(targetTimeout);

                gameInterval = setInterval(() => {
                    timeLeft--;
                    timerEl.innerText = `${timeLeft}s`;
                    if (timeLeft <= 0) endGame(false);
                }, 1000);

                spawn();
            }

            function spawn() {
                gameArea.innerHTML = '';
                if (!gameActive) return;

                const t = document.createElement('div');
                t.classList.add('target');

                const rand = Math.random();
                let points = 1;

                if (rand < 0.65) {
                    t.classList.add('red-spectre');
                    t.innerHTML = svgRed;
                    points = 1;
                } else if (rand < 0.80) {
                    t.classList.add('blue-bonus');
                    t.innerHTML = svgBlue;
                    points = 3;
                } else {
                    t.classList.add('yellow-trap');
                    t.innerHTML = svgYellow;
                    points = -1;
                }

                const targetSize = 75;
                const maxX = Math.max(10, gameArea.clientWidth - targetSize - 10);
                const maxY = Math.max(10, gameArea.clientHeight - targetSize - 10);

                t.style.left = Math.floor(Math.random() * maxX) + "px";
                t.style.top = Math.floor(Math.random() * maxY) + "px";

                // Événement Clic & Touch
                const handleHit = (e) => {
                    e.preventDefault();
                    if (!gameActive) return;

                    score += points;
                    if (score < 0) score = 0;
                    scoreEl.innerText = `${score} / ${targetScore}`;

                    if (score >= targetScore) {
                        endGame(true);
                    } else {
                        clearTimeout(targetTimeout);
                        spawn();
                    }
                };

                t.addEventListener('pointerdown', handleHit);

                gameArea.appendChild(t);
                targetTimeout = setTimeout(spawn, 1000);
            }

            function endGame(win) {
                gameActive = false;
                if (gameInterval) clearInterval(gameInterval);
                if (targetTimeout) clearTimeout(targetTimeout);
                
                gameArea.innerHTML = '';
                modalOverlay.style.display = 'flex';

                if (win) {
                    modalTitle.innerText = "🎉 TOUR DÉSACTIVÉE !";
                    modalTitle.style.color = "var(--lyoko-green)";
                    modalText.innerText = "Bravo Agent ! Tu as repoussé X.A.N.A. et sauvé le Supercalculateur !";
                    modalButtons.innerHTML = `
                        <button class="btn btn-blue" id="next-btn">👤 ENFANT SUIVANT</button>
                    `;
                } else {
                    modalTitle.innerText = "❌ ÉCHEC MISSION";
                    modalTitle.style.color = "var(--error-red)";
                    modalText.innerText = "X.A.N.A. a pris le contrôle ! Veux-tu réessayer ou passer la main ?";
                    modalButtons.innerHTML = `
                        <button class="btn btn-green" id="retry-btn">🔄 RÉESSAYER</button>
                        <button class="btn btn-blue" id="next-btn">👤 ENFANT SUIVANT</button>
                    `;
                }

                // Attachement propre des boutons de fin
                const retryBtn = document.getElementById('retry-btn');
                const nextBtn = document.getElementById('next-btn');

                if (retryBtn) retryBtn.addEventListener('click', startGame);
                if (nextBtn) nextBtn.addEventListener('click', () => { window.location.href = 'index.html'; });
            }

            // Démarrage automatique au chargement
            startGame();
        });
    </script>
</body>
</html>
